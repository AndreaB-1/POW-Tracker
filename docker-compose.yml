version: "3.9"

# ============================================================
# SolarTrack — Docker Compose
# ============================================================
# Quick start:
#   docker compose up -d
#   Then open http://localhost:5000
#
# Environment variables (override in .env or environment:):
#   SECRET_KEY        — Flask secret key (change in production!)
#   DATABASE_PATH     — SQLite file path inside the container
# ============================================================

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: solar-tracker
    restart: unless-stopped
    ports:
      - "${APP_PORT:-5000}:5000"
    volumes:
      # Persist the SQLite database across container restarts
      - solar_data:/data
    environment:
      SECRET_KEY: "${SECRET_KEY:-change-me-in-production}"
      DATABASE_PATH: /data/solar_tracker.db
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

